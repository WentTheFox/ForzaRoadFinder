<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forza Road Finder</title>
  <meta property="og:title" content="Forza Road Finder">
  <meta property="og:description" content="Browser tool that highlights undiscovered roads on the Forza Horizon 6 map by replacing their grey colour (#808080) with magenta in real time via screen capture.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://opengraph.githubassets.com/1/WentTheFox/ForzaRoadFinder">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #controls {
      padding: 8px 14px;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
      font-size: 13px;
    }

    button {
      padding: 5px 14px;
      cursor: pointer;
      background: #3a3a3a;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      font-size: 13px;
    }
    button:hover:not(:disabled) { background: #4a4a4a; }
    button:disabled { opacity: 0.4; cursor: default; }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    input[type=color] {
      width: 32px;
      height: 24px;
      padding: 1px 2px;
      border: 1px solid #555;
      border-radius: 3px;
      background: #2a2a2a;
      cursor: pointer;
    }

    input[type=range] { width: 90px; accent-color: #888; }
    input[type=number] { width: 52px; background: #2a2a2a; color: #eee; border: 1px solid #555; border-radius: 3px; padding: 2px 5px; font-size: 13px; }

    #status {
      font-size: 12px;
      color: #888;
    }

    #ghLink {
      margin-left: auto;
      font-size: 12px;
      color: #888;
      text-decoration: none;
    }
    #ghLink:hover { color: #ccc; }

    #canvas-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      overflow: hidden;
    }

    #canvas-wrap.full-scale {
      overflow: auto;
      align-items: flex-start;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
    }

    #canvas-wrap.full-scale canvas {
      max-width: none;
      max-height: none;
    }

    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: #888;
      font-size: 15px;
    }
  </style>
</head>
<body>

<div id="controls">
  <button id="startBtn">Share Screen</button>
  <button id="pauseBtn" disabled>Pause</button>
  <button id="stopBtn" disabled>Stop</button>
  <button id="saveBtn" disabled>Save Image</button>
  <button id="scaleBtn">100% Scale</button>

  <div class="ctrl-group">
    <label for="colorTarget">Find</label>
    <input type="color" id="colorTarget" value="#808080">
    <span>→</span>
    <label for="colorReplace">Replace</label>
    <input type="color" id="colorReplace" value="#ff00ff">
  </div>

  <div class="ctrl-group">
    <label for="fps">FPS</label>
    <input type="range" id="fps" min="0.1" max="5" step="0.1" value="1">
    <input type="number" id="fpsNum" min="0.1" max="5" step="0.1" value="1">
  </div>

  <div class="ctrl-group">
    <label for="tolerance">Tolerance</label>
    <input type="range" id="tolerance" min="0" max="40" step="1" value="5">
    <input type="number" id="tolNum" min="0" max="40" step="1" value="5">
  </div>

  <span id="status">Idle</span>
  <a id="ghLink" href="https://github.com/WentTheFox/ForzaRoadFinder" target="_blank" rel="noopener">GitHub</a>
</div>

<div id="canvas-wrap">
  <div id="placeholder">
    <div>Click <strong>Share Screen</strong> and select your Forza window.</div>
    <div style="font-size:12px;color:#666">Undiscovered roads (#808080) will be highlighted in magenta.</div>
  </div>
  <canvas id="canvas" style="display:none"></canvas>
</div>

<script>
  const canvas      = document.getElementById('canvas');
  const ctx         = canvas.getContext('2d', { willReadFrequently: true });
  const startBtn    = document.getElementById('startBtn');
  const pauseBtn    = document.getElementById('pauseBtn');
  const stopBtn     = document.getElementById('stopBtn');
  const saveBtn     = document.getElementById('saveBtn');
  const scaleBtn    = document.getElementById('scaleBtn');
  const canvasWrap  = document.getElementById('canvas-wrap');
  const fpsRange    = document.getElementById('fps');
  const fpsNum      = document.getElementById('fpsNum');
  const tolRange    = document.getElementById('tolerance');
  const tolNum      = document.getElementById('tolNum');
  const colorTarget  = document.getElementById('colorTarget');
  const colorReplace = document.getElementById('colorReplace');
  const statusEl     = document.getElementById('status');
  const placeholder  = document.getElementById('placeholder');

  // Keep range and number inputs in sync
  function syncPair(range, num) {
    range.addEventListener('input', () => { num.value = range.value; });
    num.addEventListener('input', () => {
      const v = Math.min(+num.max, Math.max(+num.min, +num.value));
      range.value = v;
      num.value = v;
    });
  }
  syncPair(fpsRange, fpsNum);
  syncPair(tolRange, tolNum);

  let stream  = null;
  let video   = null;
  let timer   = null;
  let running = false;
  let paused  = false;

  // Cached per-channel values and Uint32 representations of the chosen colours.
  // Uint32 layout (little-endian ImageData): R | G<<8 | B<<16 | A<<24
  let targetRgb  = [0, 0, 0];
  let replaceRgb = [0, 0, 0];
  let targetU32  = 0;
  let replaceU32 = 0;

  function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return [(n >> 16) & 0xFF, (n >> 8) & 0xFF, n & 0xFF];
  }

  function rgbToU32(r, g, b) {
    return (r | (g << 8) | (b << 16) | (0xFF << 24)) | 0;
  }

  function updateColors() {
    targetRgb  = hexToRgb(colorTarget.value);
    replaceRgb = hexToRgb(colorReplace.value);
    targetU32  = rgbToU32(...targetRgb);
    replaceU32 = rgbToU32(...replaceRgb);
  }

  colorTarget.addEventListener('input', updateColors);
  colorReplace.addEventListener('input', updateColors);
  updateColors();

  startBtn.addEventListener('click', async () => {
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: 5, width: { ideal: 2560 }, height: { ideal: 1440 } },
        audio: false,
      });
      video = document.createElement('video');
      video.srcObject = stream;
      video.muted = true;
      await video.play();

      // Wait for actual dimensions
      if (!video.videoWidth) {
        await new Promise(res => video.addEventListener('loadedmetadata', res, { once: true }));
      }

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.style.display = 'block';
      placeholder.style.display = 'none';

      stream.getVideoTracks()[0].addEventListener('ended', stopCapture);

      running = true;
      paused  = false;
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      stopBtn.disabled  = false;
      processFrame();
    } catch (e) {
      statusEl.textContent = 'Error: ' + (e.message || e);
    }
  });

  scaleBtn.addEventListener('click', () => {
    const full = canvasWrap.classList.toggle('full-scale');
    scaleBtn.textContent = full ? 'Fit to Window' : '100% Scale';
  });

  saveBtn.addEventListener('click', () => {
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `forza-roads-${new Date().toISOString().replace(/[:.]/g, '-')}.png`;
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  });

  pauseBtn.addEventListener('click', () => {
    if (!running) return;
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    if (!paused) processFrame();
    else { clearTimeout(timer); statusEl.textContent = 'Paused'; }
  });

  stopBtn.addEventListener('click', stopCapture);

  function stopCapture() {
    running = false;
    paused  = false;
    clearTimeout(timer);
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video = null;
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    pauseBtn.textContent = 'Pause';
    stopBtn.disabled  = true;
    saveBtn.disabled  = true;
    statusEl.textContent = 'Stopped';
  }

  function processFrame() {
    if (!running || paused) return;

    const t0 = performance.now();
    const W  = canvas.width;
    const H  = canvas.height;

    ctx.drawImage(video, 0, 0, W, H);

    const imageData = ctx.getImageData(0, 0, W, H);
    const data      = imageData.data;
    const tol       = parseInt(tolRange.value, 10);

    if (tol === 0) {
      const buf32 = new Uint32Array(data.buffer);
      const len = buf32.length;
      for (let i = 0; i < len; i++) {
        if (buf32[i] === targetU32) buf32[i] = replaceU32;
      }
    } else {
      const [tr, tg, tb] = targetRgb;
      const [rr, rg, rb] = replaceRgb;
      const len = data.length;
      for (let i = 0; i < len; i += 4) {
        if (Math.abs(data[i]   - tr) <= tol &&
            Math.abs(data[i+1] - tg) <= tol &&
            Math.abs(data[i+2] - tb) <= tol) {
          data[i]   = rr;
          data[i+1] = rg;
          data[i+2] = rb;
        }
      }
    }

    ctx.putImageData(imageData, 0, 0);
    saveBtn.disabled = false;

    const elapsed = performance.now() - t0;
    const fps = parseFloat(fpsRange.value);
    statusEl.textContent = `${W}×${H} — frame ${elapsed.toFixed(0)} ms — next in ${(1000/fps).toFixed(0)} ms`;

    timer = setTimeout(processFrame, 1000 / fps);
  }
</script>
</body>
</html>
